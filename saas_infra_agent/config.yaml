embeddings:
  provider: openai             
  model: text-embedding-3-small

vector_store:
  provider: qdrant
  retrieval_mode: hybrid  # dense | sparse | hybrid

qdrant:
  collection_name: saas_agent # it is cloud, so no persist_dir

llm:
  provider: openai        # openai | anthropic
  model: gpt-4o
  small_model: gpt-5-mini
  max_tokens: 9000        # max output tokens per request
  small_max_tokens: 3000  # optional override for the small model

memory:
  db_path: .memory/memory.db
  summarize_at_tokens: 8000
  keep_last_messages: 30

agent:
  artifact_dir: .
  # Safety limits to prevent runaway loops
  model_call_run_limit: 10        # max LLM calls per invocation (null disables)
  tool_call_run_limit: 40         # max tool calls per invocation (null disables)
  model_call_exit_behavior: end   # end | error
  tool_call_exit_behavior: continue  # continue | end | error
  # Build agent overrides (long-running plan-and-execute deep agent)
  build:
    model_call_run_limit: 60
    tool_call_run_limit: 200
    recursion_limit: 500          # LangGraph superstep cap for one build run

web_search:
  provider: tavily
  timeout_s: 10                          # used by DuckDuckGo fallback only
